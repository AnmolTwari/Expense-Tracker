<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExpenseTracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p class="auth-subtitle">Login to manage your expenses</p>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <span class="alert-icon">⚠️</span>
                <span th:text="${error}"></span>
            </div>

            <div th:if="${param.registered}" class="alert alert-success">
                <span class="alert-icon">✓</span>
                <span>Account created successfully! Please login.</span>
            </div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" 
                           placeholder="Enter your username" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" 
                           placeholder="Enter your password" required />
                </div>

                <div class="form-remember">
                    <a th:href="@{/forgot-password}" class="link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a th:href="@{/register}" class="link">Register here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
