<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ExpenseTracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <div class="reset-password-wrapper">
        <div class="reset-password-container">
            <div class="reset-header">
                <h1>Reset Your Password</h1>
                <p class="reset-subtitle">Enter your new password to secure your account</p>
            </div>

            <form method="post" action="/reset-password" class="reset-form">
                <input type="hidden" name="token" th:value="${token}" />

                <div th:if="${error}" class="alert alert-error">
                    <span class="alert-icon">⚠️</span>
                    <span th:text="${error}"></span>
                </div>

                <div class="form-group">
                    <label for="password">New Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="Enter your new password" required />
                        <span class="password-toggle" onclick="togglePassword('password')">👁️</span>
                    </div>
                    <small class="password-hint">Minimum 6 characters recommended</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" 
                               placeholder="Confirm your new password" required />
                        <span class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Reset Password</button>
                    <a href="/login" class="btn btn-secondary">Back to Login</a>
                </div>
            </form>

            <div class="reset-footer">
                <p>Remember your password? <a href="/login" class="link">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
            field.setAttribute('type', type);
        }
    </script>
</body>
</html>
